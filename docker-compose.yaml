services:
  db:
    image: postgres:17
    container_name: aethon-db
    environment:
      POSTGRES_DB: aethon
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - aethon-postgres-data:/var/lib/postgresql/data
      - ./db/sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aethon"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: src/Aethon.Api/Dockerfile
    container_name: aethon-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      EnableHttpsRedirection: "false"
      DataProtection__KeysPath: /keys
      DataProtection__ApplicationName: Aethon
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=aethon;Username=postgres;Password=postgres
      Auth__JwtKey: "change-this-to-a-secure-random-key-min-32-chars!!"
      Auth__Issuer: "aethon-api"
      Auth__Audience: "aethon-web"
    ports:
      - "5201:8080"
    volumes:
      - aethon-dpkeys:/keys
      - aethon-uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: src/Aethon.Web/Dockerfile
    container_name: aethon-web
    depends_on:
      api:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      EnableHttpsRedirection: "false"
      DataProtection__KeysPath: /keys
      DataProtection__ApplicationName: Aethon
      DataProtection__CertBase64: ${DataProtection__CertBase64}
      ApiBaseUrl: http://api:8080
    ports:
      - "5101:8080"
    volumes:
      - aethon-dpkeys:/keys

volumes:
  aethon-postgres-data:
  aethon-dpkeys:
  aethon-uploads:
