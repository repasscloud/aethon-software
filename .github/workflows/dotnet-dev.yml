name: dev Build, PR and Deploy

on:
  push:
    branches: [ "dev" ]
  pull_request:
    branches: [ "dev" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

  create-pr:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'

    permissions:
      contents: write
      pull-requests: write

    steps:
    - uses: actions/checkout@v4

    - name: Create PR and merge to main
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        EXISTING_PR=$(gh pr list --base main --head dev --json number --jq '.[0].number')
        if [ -z "$EXISTING_PR" ]; then
          gh pr create \
            --base main \
            --head dev \
            --title "Merge dev into main" \
            --body "Automated PR from dev build passing."
          PR_NUMBER=$(gh pr list --base main --head dev --json number --jq '.[0].number')
        else
          PR_NUMBER=$EXISTING_PR
        fi
        gh pr merge "$PR_NUMBER" --squash --admin

  deploy-to-dev:
    needs: create-pr
    runs-on: ubuntu-latest

    steps:
    - name: Deploy via SSH
      run: |
        echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > private_key
        chmod 600 private_key
        ssh -i private_key \
          -o StrictHostKeyChecking=no \
          ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
          "bash ${{ secrets.DEPLOY_SCRIPT_PATH }}"
        rm -f private_key