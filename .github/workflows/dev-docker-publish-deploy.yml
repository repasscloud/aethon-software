# .github/workflows/docker-publish.yml
name: Dev Docker Publish and Deploy

on:
  push:
    branches: [ "dev" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  APPLICATION: Aethon
  DEPLOY_ENVIRONMENT: Development
  RESULT_SUCCESS: Deployment finished and service is healthy

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      commit_short: ${{ steps.meta.outputs.commit_short }}
      branch_name: ${{ steps.meta.outputs.branch_name }}
      pipeline_url: ${{ steps.meta.outputs.pipeline_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Read metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ ! -f VERSION_INFO ]]; then
            echo "VERSION_INFO file not found" >&2
            exit 1
          fi

          VERSION="$(head -n 1 VERSION_INFO | tr -d '\r')"
          COMMIT_SHORT="${GITHUB_SHA::7}"
          BRANCH_NAME="${GITHUB_REF_NAME}"
          PIPELINE_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "commit_short=$COMMIT_SHORT" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "pipeline_url=$PIPELINE_URL" >> "$GITHUB_OUTPUT"

  build-and-push-api:
    runs-on: ubuntu-latest
    outputs:
      failed_stage: ${{ steps.capture.outputs.failed_stage }}
      failed_result: ${{ steps.capture.outputs.failed_result }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6.0.2

      - name: Log in to Docker Hub
        id: docker_login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push API
        id: api_build_push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/Aethon.Api/Dockerfile
          push: true
          tags: repasscloud/aethon-api:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capture failure metadata
        id: capture
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          FAILED_STAGE=""
          FAILED_RESULT=""

          if [[ "${{ steps.checkout.outcome }}" == "failure" ]]; then
            FAILED_STAGE="API / Checkout"
            FAILED_RESULT="Repository checkout failed"
          elif [[ "${{ steps.docker_login.outcome }}" == "failure" ]]; then
            FAILED_STAGE="API / Docker login"
            FAILED_RESULT="Failed to authenticate to Docker Hub"
          elif [[ "${{ steps.buildx.outcome }}" == "failure" ]]; then
            FAILED_STAGE="API / Buildx"
            FAILED_RESULT="Failed to initialise Docker Buildx"
          elif [[ "${{ steps.api_build_push.outcome }}" == "failure" ]]; then
            FAILED_STAGE="API / Build and push"
            FAILED_RESULT="Failed building or pushing ./src/Aethon.Api/Dockerfile"
          fi

          echo "failed_stage=$FAILED_STAGE" >> "$GITHUB_OUTPUT"
          echo "failed_result=$FAILED_RESULT" >> "$GITHUB_OUTPUT"

  build-and-push-builder:
    runs-on: ubuntu-latest
    outputs:
      failed_stage: ${{ steps.capture.outputs.failed_stage }}
      failed_result: ${{ steps.capture.outputs.failed_result }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6.0.2

      - name: Log in to Docker Hub
        id: docker_login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Ensure builder image exists
        id: ensure_builder
        shell: bash
        run: |
          set -euo pipefail

          if ! docker pull repasscloud/aethon-web-builder:mcr-dotnet-sdk-10.0; then
            chmod +x .docker/build.sh
            .docker/build.sh
          fi

      - name: Capture failure metadata
        id: capture
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          FAILED_STAGE=""
          FAILED_RESULT=""

          if [[ "${{ steps.checkout.outcome }}" == "failure" ]]; then
            FAILED_STAGE="Builder / Checkout"
            FAILED_RESULT="Repository checkout failed"
          elif [[ "${{ steps.docker_login.outcome }}" == "failure" ]]; then
            FAILED_STAGE="Builder / Docker login"
            FAILED_RESULT="Failed to authenticate to Docker Hub"
          elif [[ "${{ steps.buildx.outcome }}" == "failure" ]]; then
            FAILED_STAGE="Builder / Buildx"
            FAILED_RESULT="Failed to initialise Docker Buildx"
          elif [[ "${{ steps.ensure_builder.outcome }}" == "failure" ]]; then
            FAILED_STAGE="Builder / Ensure builder image exists"
            FAILED_RESULT="Failed pulling or building repasscloud/aethon-web-builder:mcr-dotnet-sdk-10.0"
          fi

          echo "failed_stage=$FAILED_STAGE" >> "$GITHUB_OUTPUT"
          echo "failed_result=$FAILED_RESULT" >> "$GITHUB_OUTPUT"

  build-and-push-web:
    needs: build-and-push-builder
    runs-on: ubuntu-latest
    outputs:
      failed_stage: ${{ steps.capture.outputs.failed_stage }}
      failed_result: ${{ steps.capture.outputs.failed_result }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6.0.2

      - name: Log in to Docker Hub
        id: docker_login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Ensure builder image exists
        id: ensure_builder
        shell: bash
        run: |
          set -euo pipefail

          if ! docker pull repasscloud/aethon-web-builder:mcr-dotnet-sdk-10.0; then
            chmod +x .docker/build.sh
            .docker/build.sh
          fi

      - name: Build and push Web
        id: web_build_push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/Aethon.Web/Dockerfile
          push: true
          tags: repasscloud/aethon-web:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Capture failure metadata
        id: capture
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          FAILED_STAGE=""
          FAILED_RESULT=""

          if [[ "${{ steps.checkout.outcome }}" == "failure" ]]; then
            FAILED_STAGE="Web / Checkout"
            FAILED_RESULT="Repository checkout failed"
          elif [[ "${{ steps.docker_login.outcome }}" == "failure" ]]; then
            FAILED_STAGE="Web / Docker login"
            FAILED_RESULT="Failed to authenticate to Docker Hub"
          elif [[ "${{ steps.buildx.outcome }}" == "failure" ]]; then
            FAILED_STAGE="Web / Buildx"
            FAILED_RESULT="Failed to initialise Docker Buildx"
          elif [[ "${{ steps.ensure_builder.outcome }}" == "failure" ]]; then
            FAILED_STAGE="Web / Ensure builder image exists"
            FAILED_RESULT="Failed pulling or building repasscloud/aethon-web-builder:mcr-dotnet-sdk-10.0"
          elif [[ "${{ steps.web_build_push.outcome }}" == "failure" ]]; then
            FAILED_STAGE="Web / Build and push"
            FAILED_RESULT="Failed building or pushing ./src/Aethon.Web/Dockerfile"
          fi

          echo "failed_stage=$FAILED_STAGE" >> "$GITHUB_OUTPUT"
          echo "failed_result=$FAILED_RESULT" >> "$GITHUB_OUTPUT"

  deploy-to-dev:
    needs: [build-and-push-api, build-and-push-web]
    runs-on: ubuntu-latest
    outputs:
      failed_stage: ${{ steps.capture.outputs.failed_stage }}
      failed_result: ${{ steps.capture.outputs.failed_result }}
    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v6.0.2

      - name: Deploy via SSH
        id: deploy_ssh
        shell: bash
        run: |
          set -euo pipefail

          DEPLOY_ARG=""
          if grep -qi "^refresh$" .deployment 2>/dev/null; then
            DEPLOY_ARG="refresh"
          fi

          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > private_key
          chmod 600 private_key

          ssh -i private_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "bash ${{ secrets.DEPLOY_SCRIPT_PATH }} $DEPLOY_ARG"

          rm -f private_key

      - name: Capture failure metadata
        id: capture
        if: always()
        shell: bash
        run: |
          set -euo pipefail

          FAILED_STAGE=""
          FAILED_RESULT=""

          if [[ "${{ steps.checkout.outcome }}" == "failure" ]]; then
            FAILED_STAGE="Deploy / Checkout"
            FAILED_RESULT="Repository checkout failed"
          elif [[ "${{ steps.deploy_ssh.outcome }}" == "failure" ]]; then
            FAILED_STAGE="Deploy / SSH"
            FAILED_RESULT="Remote deployment script failed over SSH"
          fi

          echo "failed_stage=$FAILED_STAGE" >> "$GITHUB_OUTPUT"
          echo "failed_result=$FAILED_RESULT" >> "$GITHUB_OUTPUT"

  notify:
    needs:
      - metadata
      - build-and-push-api
      - build-and-push-builder
      - build-and-push-web
      - deploy-to-dev
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Evaluate pipeline result
        id: evaluate
        shell: bash
        run: |
          set -euo pipefail

          PIPELINE_STATUS="success"
          FAILED_STAGE=""
          FAILED_RESULT=""

          if [[ "${{ needs.metadata.result }}" == "failure" ]]; then
            PIPELINE_STATUS="failure"
            FAILED_STAGE="Metadata / Read VERSION_INFO"
            FAILED_RESULT="Failed reading VERSION_INFO or git metadata"
          elif [[ "${{ needs.build-and-push-api.result }}" == "failure" ]]; then
            PIPELINE_STATUS="failure"
            FAILED_STAGE="${{ needs.build-and-push-api.outputs.failed_stage }}"
            FAILED_RESULT="${{ needs.build-and-push-api.outputs.failed_result }}"
          elif [[ "${{ needs.build-and-push-builder.result }}" == "failure" ]]; then
            PIPELINE_STATUS="failure"
            FAILED_STAGE="${{ needs.build-and-push-builder.outputs.failed_stage }}"
            FAILED_RESULT="${{ needs.build-and-push-builder.outputs.failed_result }}"
          elif [[ "${{ needs.build-and-push-web.result }}" == "failure" ]]; then
            PIPELINE_STATUS="failure"
            FAILED_STAGE="${{ needs.build-and-push-web.outputs.failed_stage }}"
            FAILED_RESULT="${{ needs.build-and-push-web.outputs.failed_result }}"
          elif [[ "${{ needs.deploy-to-dev.result }}" == "failure" ]]; then
            PIPELINE_STATUS="failure"
            FAILED_STAGE="${{ needs.deploy-to-dev.outputs.failed_stage }}"
            FAILED_RESULT="${{ needs.deploy-to-dev.outputs.failed_result }}"
          fi

          echo "pipeline_status=$PIPELINE_STATUS" >> "$GITHUB_OUTPUT"
          echo "failed_stage=$FAILED_STAGE" >> "$GITHUB_OUTPUT"
          echo "failed_result=$FAILED_RESULT" >> "$GITHUB_OUTPUT"

      - name: Create success HTML card
        if: steps.evaluate.outputs.pipeline_status == 'success'
        shell: bash
        run: |
          set -euo pipefail

          cat > deployment-card-option-3-final.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Deployment Card Option 3</title>
            <style>
              :root {
                --text: #e5e7eb;
                --muted: #94a3b8;
                --border: rgba(148, 163, 184, 0.22);
                --shadow: 0 24px 48px rgba(0,0,0,0.35);
                --radius: 18px;
              }
              * { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background:
                  radial-gradient(circle at top left, rgba(56, 189, 248, 0.14), transparent 30%),
                  radial-gradient(circle at top right, rgba(139, 92, 246, 0.14), transparent 35%),
                  linear-gradient(180deg, #020617 0%, #0f172a 100%);
                color: var(--text);
                display: grid;
                place-items: center;
                padding: 32px;
              }
              .preview { width: 100%; max-width: 560px; }
              .card {
                border-radius: var(--radius);
                overflow: hidden;
                border: 1px solid var(--border);
                background: linear-gradient(180deg, rgba(17,24,39,.98), rgba(15,23,42,.98));
                box-shadow: var(--shadow);
              }
              .header {
                padding: 18px 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                border-bottom: 1px solid rgba(148,163,184,.14);
                background:
                  radial-gradient(circle at left, rgba(56, 189, 248, 0.12), transparent 32%),
                  radial-gradient(circle at right, rgba(139, 92, 246, 0.16), transparent 36%),
                  linear-gradient(90deg, rgba(56, 189, 248, 0.14), rgba(139, 92, 246, 0.16));
              }
              .title {
                display: flex;
                align-items: center;
                gap: 12px;
              }
              .icon {
                width: 38px;
                height: 38px;
                border-radius: 12px;
                display: grid;
                place-items: center;
                font-weight: 800;
                color: white;
                flex: 0 0 auto;
                background: linear-gradient(135deg, #0284c7, #38bdf8);
                box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
              }
              .heading {
                font-size: 18px;
                font-weight: 800;
                line-height: 1.2;
                margin: 0;
              }
              .status {
                font-size: 12px;
                font-weight: 700;
                padding: 7px 10px;
                border-radius: 999px;
                border: 1px solid rgba(255,255,255,.10);
                white-space: nowrap;
                color: #bae6fd;
                background: rgba(56, 189, 248, 0.14);
                backdrop-filter: blur(6px);
              }
              .body { padding: 18px 20px 20px; }
              .kv {
                display: grid;
                grid-template-columns: 110px 1fr;
                gap: 10px 12px;
                font-size: 14px;
                margin-bottom: 20px;
              }
              .k { color: var(--muted); }
              .v {
                color: var(--text);
                font-weight: 600;
                word-break: break-word;
              }
              .footer {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                padding-top: 14px;
                border-top: 1px solid rgba(148,163,184,.12);
              }
              .btn {
                text-decoration: none;
                font-size: 13px;
                font-weight: 700;
                color: white;
                padding: 10px 12px;
                border-radius: 12px;
                background: linear-gradient(135deg, #2563eb, #3b82f6);
                border: 1px solid rgba(255,255,255,.1);
                display: inline-block;
              }
              code {
                font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                font-size: 12px;
                color: #c4b5fd;
              }
            </style>
          </head>
          <body>
            <div class="preview">
              <article class="card">
                <div class="header">
                  <div class="title">
                    <div class="icon">↗</div>
                    <div>
                      <h1 class="heading">Deployment Notification</h1>
                    </div>
                  </div>
                  <div class="status">Completed</div>
                </div>
                <div class="body">
                  <div class="kv">
                    <div class="k">Application</div><div class="v">${APPLICATION}</div>
                    <div class="k">Environment</div><div class="v">${DEPLOY_ENVIRONMENT}</div>
                    <div class="k">Version</div><div class="v">${{ needs.metadata.outputs.version }}</div>
                    <div class="k">Branch</div><div class="v"><code>${{ needs.metadata.outputs.branch_name }}</code></div>
                    <div class="k">Commit</div><div class="v"><code>${{ needs.metadata.outputs.commit_short }}</code></div>
                    <div class="k">Result</div><div class="v">${RESULT_SUCCESS}</div>
                  </div>
                  <div class="footer">
                    <a class="btn" href="${{ needs.metadata.outputs.pipeline_url }}">Pipeline</a>
                  </div>
                </div>
              </article>
            </div>
          </body>
          </html>
          EOF

      - name: Create failed HTML card
        if: steps.evaluate.outputs.pipeline_status == 'failure'
        shell: bash
        run: |
          set -euo pipefail

          cat > deployment-card-failed-pipeline.html <<EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>Deployment Card - Failed Pipeline</title>
            <style>
              :root {
                --text: #e5e7eb;
                --muted: #94a3b8;
                --border: rgba(148, 163, 184, 0.22);
                --shadow: 0 24px 48px rgba(0,0,0,0.35);
                --radius: 18px;
              }
              * { box-sizing: border-box; }
              body {
                margin: 0;
                min-height: 100vh;
                font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background:
                  radial-gradient(circle at top left, rgba(245, 158, 11, 0.10), transparent 30%),
                  radial-gradient(circle at top right, rgba(239, 68, 68, 0.10), transparent 35%),
                  linear-gradient(180deg, #020617 0%, #0f172a 100%);
                color: var(--text);
                display: grid;
                place-items: center;
                padding: 32px;
              }
              .preview { width: 100%; max-width: 560px; }
              .card {
                border-radius: var(--radius);
                overflow: hidden;
                border: 1px solid var(--border);
                background: linear-gradient(180deg, rgba(17,24,39,.98), rgba(15,23,42,.98));
                box-shadow: var(--shadow);
              }
              .header {
                padding: 18px 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 16px;
                border-bottom: 1px solid rgba(148,163,184,.14);
                background:
                  radial-gradient(circle at left, rgba(245, 158, 11, 0.12), transparent 32%),
                  radial-gradient(circle at right, rgba(239, 68, 68, 0.14), transparent 36%),
                  linear-gradient(90deg, rgba(245, 158, 11, 0.14), rgba(239, 68, 68, 0.16));
              }
              .title {
                display: flex;
                align-items: center;
                gap: 12px;
              }
              .icon {
                width: 38px;
                height: 38px;
                border-radius: 12px;
                display: grid;
                place-items: center;
                font-weight: 800;
                color: white;
                flex: 0 0 auto;
                background: linear-gradient(135deg, #d97706, #ef4444);
                box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
              }
              .heading {
                font-size: 18px;
                font-weight: 800;
                line-height: 1.2;
                margin: 0;
              }
              .status {
                font-size: 12px;
                font-weight: 700;
                padding: 7px 10px;
                border-radius: 999px;
                border: 1px solid rgba(255,255,255,.10);
                white-space: nowrap;
                color: #fde68a;
                background: rgba(245, 158, 11, 0.12);
                backdrop-filter: blur(6px);
              }
              .body { padding: 18px 20px 20px; }
              .summary {
                margin: 0 0 18px;
                font-size: 14px;
                line-height: 1.5;
                color: #f3f4f6;
              }
              .kv {
                display: grid;
                grid-template-columns: 110px 1fr;
                gap: 10px 12px;
                font-size: 14px;
                margin-bottom: 20px;
              }
              .k { color: var(--muted); }
              .v {
                color: var(--text);
                font-weight: 600;
                word-break: break-word;
              }
              .footer {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                padding-top: 14px;
                border-top: 1px solid rgba(148,163,184,.12);
              }
              .btn {
                text-decoration: none;
                font-size: 13px;
                font-weight: 700;
                color: white;
                padding: 10px 12px;
                border-radius: 12px;
                background: linear-gradient(135deg, #b45309, #dc2626);
                border: 1px solid rgba(255,255,255,.1);
                display: inline-block;
              }
              code {
                font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
                font-size: 12px;
                color: #fca5a5;
              }
            </style>
          </head>
          <body>
            <div class="preview">
              <article class="card">
                <div class="header">
                  <div class="title">
                    <div class="icon">!</div>
                    <div>
                      <h1 class="heading">Deployment Failed</h1>
                    </div>
                  </div>
                  <div class="status">Action required</div>
                </div>
                <div class="body">
                  <p class="summary">
                    The pipeline completed with a failure state. Deployment did not finish successfully and requires review before retrying.
                  </p>
                  <div class="kv">
                    <div class="k">Application</div><div class="v">${APPLICATION}</div>
                    <div class="k">Environment</div><div class="v">${DEPLOY_ENVIRONMENT}</div>
                    <div class="k">Version</div><div class="v">${{ needs.metadata.outputs.version }}</div>
                    <div class="k">Branch</div><div class="v"><code>${{ needs.metadata.outputs.branch_name }}</code></div>
                    <div class="k">Commit</div><div class="v"><code>${{ needs.metadata.outputs.commit_short }}</code></div>
                    <div class="k">Stage</div><div class="v">${{ steps.evaluate.outputs.failed_stage }}</div>
                    <div class="k">Result</div><div class="v">${{ steps.evaluate.outputs.failed_result }}</div>
                  </div>
                  <div class="footer">
                    <a class="btn" href="${{ needs.metadata.outputs.pipeline_url }}">View Pipeline</a>
                  </div>
                </div>
              </article>
            </div>
          </body>
          </html>
          EOF

      - name: Upload generated HTML artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-notification-cards
          path: |
            deployment-card-option-3-final.html
            deployment-card-failed-pipeline.html
          if-no-files-found: ignore

      - name: Send success payload to Power Automate webhook
        if: steps.evaluate.outputs.pipeline_status == 'success'
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_MSTEAMS_DEPLOY_NOTIFY }}
        run: |
          set -euo pipefail

          HTML_CONTENT="$(python3 - <<'PY'
          from pathlib import Path
          import json
          print(json.dumps(Path("deployment-card-option-3-final.html").read_text(encoding="utf-8")))
          PY
          )"

          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "status": "success",
            "application": "${APPLICATION}",
            "environment": "${DEPLOY_ENVIRONMENT}",
            "version": "${{ needs.metadata.outputs.version }}",
            "branch": "${{ needs.metadata.outputs.branch_name }}",
            "commit": "${{ needs.metadata.outputs.commit_short }}",
            "result": "${RESULT_SUCCESS}",
            "pipelineUrl": "${{ needs.metadata.outputs.pipeline_url }}",
            "html": ${HTML_CONTENT}
          }
          EOF

      - name: Send failure payload to Power Automate webhook
        if: steps.evaluate.outputs.pipeline_status == 'failure'
        shell: bash
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_MSTEAMS_DEPLOY_NOTIFY }}
        run: |
          set -euo pipefail

          HTML_CONTENT="$(python3 - <<'PY'
          from pathlib import Path
          import json
          print(json.dumps(Path("deployment-card-failed-pipeline.html").read_text(encoding="utf-8")))
          PY
          )"

          curl -sS -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d @- <<EOF
          {
            "status": "failure",
            "application": "${APPLICATION}",
            "environment": "${DEPLOY_ENVIRONMENT}",
            "version": "${{ needs.metadata.outputs.version }}",
            "branch": "${{ needs.metadata.outputs.branch_name }}",
            "commit": "${{ needs.metadata.outputs.commit_short }}",
            "failedStage": "${{ steps.evaluate.outputs.failed_stage }}",
            "result": "${{ steps.evaluate.outputs.failed_result }}",
            "pipelineUrl": "${{ needs.metadata.outputs.pipeline_url }}",
            "html": ${HTML_CONTENT}
          }
          EOF

      - name: Fail workflow after notification
        if: steps.evaluate.outputs.pipeline_status == 'failure'
        shell: bash
        run: |
          echo "Pipeline failed at stage: ${{ steps.evaluate.outputs.failed_stage }}" >&2
          exit 1