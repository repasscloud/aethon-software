# .github/workflows/docker-publish.yml
name: Dev Docker Publish and Deploy

on:
  push:
    branches: [ "dev" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push API
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/Aethon.Api/Dockerfile
          push: true
          tags: repasscloud/aethon-api:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-and-push-builder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Ensure builder image exists
        run: |
          if ! docker pull repasscloud/aethon-web-builder:mcr-dotnet-sdk-10.0; then
            chmod +x .docker/build.sh
            .docker/build.sh
          fi

  build-and-push-web:
    needs: build-and-push-builder
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Ensure builder image exists
        run: |
          if ! docker pull repasscloud/aethon-web-builder:mcr-dotnet-sdk-10.0; then
            chmod +x .docker/build.sh
            .docker/build.sh
          fi

      - name: Build and push Web
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./src/Aethon.Web/Dockerfile
          push: true
          tags: repasscloud/aethon-web:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-dev:
    needs: [build-and-push-api, build-and-push-web]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Deploy via SSH
        run: |
          DEPLOY_ARG=""
          if grep -qi "^refresh$" .deployment 2>/dev/null; then
            DEPLOY_ARG="refresh"
          fi
          echo "${{ secrets.SSH_PRIVATE_KEY }}" | tr -d '\r' > private_key
          chmod 600 private_key
          ssh -i private_key \
            -o StrictHostKeyChecking=no \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "bash ${{ secrets.DEPLOY_SCRIPT_PATH }} $DEPLOY_ARG"
          rm -f private_key