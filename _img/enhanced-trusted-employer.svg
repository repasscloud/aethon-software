<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">Enhanced Trusted Employer</title>
  <desc id="desc">Square verification badge for enhanced trusted employer</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </linearGradient>
    <linearGradient id="starRing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="shield2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="26" flood-color="#000000" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" rx="80" fill="url(#bg2)"/>
  <rect x="44" y="44" width="992" height="992" rx="56" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="4"/>

  <g filter="url(#shadow2)">
    <circle cx="540" cy="360" r="194" fill="#FFFFFF" fill-opacity="0.06"/>
    <circle cx="540" cy="360" r="168" fill="none" stroke="url(#starRing)" stroke-width="18"/>
    <path d="M540 214 L680 270 V402 C680 527 600 630 540 663 C480 630 400 527 400 402 V270 Z" fill="url(#shield2)"/>
    <path d="M476 405 L525 454 L616 360" fill="none" stroke="#FFFFFF" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M540 145 L554 187 L598 187 L562 213 L575 255 L540 229 L505 255 L518 213 L482 187 L526 187 Z" fill="#FDE68A"/>
  </g>

  <text x="540" y="780" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, Helvetica, sans-serif" font-size="74" font-weight="800" letter-spacing="1">TRUSTED</text>
  <text x="540" y="850" text-anchor="middle" fill="#F4E8FF" font-family="Inter, Arial, Helvetica, sans-serif" font-size="40" font-weight="600" letter-spacing="5">ENHANCED EMPLOYER</text>
</svg>
