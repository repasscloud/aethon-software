<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deployment Card Option 3</title>
  <style>
    :root {
      --text: #e5e7eb;
      --muted: #94a3b8;
      --border: rgba(148, 163, 184, 0.22);
      --info: #38bdf8;
      --shadow: 0 24px 48px rgba(0,0,0,0.35);
      --radius: 18px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.14), transparent 30%),
        radial-gradient(circle at top right, rgba(139, 92, 246, 0.14), transparent 35%),
        linear-gradient(180deg, #020617 0%, #0f172a 100%);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 32px;
    }

    .preview {
      width: 100%;
      max-width: 560px;
    }

    .label {
      margin: 0 0 14px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }

    .card {
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(17,24,39,.98), rgba(15,23,42,.98));
      box-shadow: var(--shadow);
    }

    .header {
      padding: 18px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid rgba(148,163,184,.14);
      background:
        radial-gradient(circle at left, rgba(56, 189, 248, 0.12), transparent 32%),
        radial-gradient(circle at right, rgba(139, 92, 246, 0.16), transparent 36%),
        linear-gradient(90deg, rgba(56, 189, 248, 0.14), rgba(139, 92, 246, 0.16));
    }

    .title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .icon {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-weight: 800;
      color: white;
      flex: 0 0 auto;
      background: linear-gradient(135deg, #0284c7, #38bdf8);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15);
    }

    .heading {
      font-size: 18px;
      font-weight: 800;
      line-height: 1.2;
      margin: 0;
    }

    .status {
      font-size: 12px;
      font-weight: 700;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.10);
      white-space: nowrap;
      color: #bae6fd;
      background: rgba(56, 189, 248, 0.14);
      backdrop-filter: blur(6px);
    }

    .body {
      padding: 18px 20px 20px;
    }

    .kv {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 10px 12px;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .k {
      color: var(--muted);
    }

    .v {
      color: var(--text);
      font-weight: 600;
      word-break: break-word;
    }

    .footer {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      padding-top: 14px;
      border-top: 1px solid rgba(148,163,184,.12);
    }

    .btn {
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
      color: white;
      padding: 10px 12px;
      border-radius: 12px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      border: 1px solid rgba(255,255,255,.1);
      display: inline-block;
    }

    @media (max-width: 640px) {
      body { padding: 18px; }
      .header { align-items: flex-start; flex-direction: column; }
      .kv { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="preview">
    <p class="label">Dedicated Preview</p>

    <article class="card">
      <div class="header">
        <div class="title">
          <div class="icon">↗</div>
          <div>
            <h1 class="heading">Deployment Notification</h1>
          </div>
        </div>
        <div class="status">Completed</div>
      </div>

      <div class="body">
        <div class="kv">
          <div class="k">Application</div><div class="v">Aethon Admin Portal</div>
          <div class="k">Environment</div><div class="v">UAT</div>
          <div class="k">Version</div><div class="v">2026.03.30-rc.2</div>
          <div class="k">Branch</div><div class="v"><code>release/2026.03</code></div>
          <div class="k">Commit</div><div class="v"><code>a84ce71</code></div>
          <div class="k">Result</div><div class="v">Deployment finished and service is healthy</div>
        </div>

        <div class="footer">
          <a class="btn" href="#">Pipeline</a>
        </div>
      </div>
    </article>
  </div>
</body>
</html>
