<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080" role="img" aria-labelledby="title desc">
  <title id="title">Standard Employer Verification</title>
  <desc id="desc">Square verification badge for standard employer verification</desc>
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="shield1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="24" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1080" height="1080" rx="80" fill="url(#bg1)"/>
  <rect x="44" y="44" width="992" height="992" rx="56" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="4"/>

  <g filter="url(#shadow)">
    <circle cx="540" cy="372" r="182" fill="#FFFFFF" fill-opacity="0.08"/>
    <path d="M540 220 L690 280 V420 C690 548 603 654 540 688 C477 654 390 548 390 420 V280 Z" fill="url(#shield1)"/>
    <path d="M470 430 L520 480 L620 370" fill="none" stroke="#FFFFFF" stroke-width="34" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="540" y="790" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, Helvetica, sans-serif" font-size="74" font-weight="700" letter-spacing="1">VERIFIED</text>
  <text x="540" y="860" text-anchor="middle" fill="#DCE8FF" font-family="Inter, Arial, Helvetica, sans-serif" font-size="40" font-weight="500" letter-spacing="5">STANDARD EMPLOYER</text>
</svg>
